<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090d"/>
      <stop offset="100%" style="stop-color:#101218"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="40%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#f0d68a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a1c28" stroke-width="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="240" y1="140" x2="240" y2="520"/>
    <line x1="480" y1="140" x2="480" y2="520"/>
    <line x1="720" y1="140" x2="720" y2="520"/>
    <line x1="960" y1="140" x2="960" y2="520"/>
  </g>

  <!-- Chart area fill -->
  <polygon
    fill="#22c55e"
    opacity="0.04"
    points="100,460 180,440 260,445 340,410 420,420 500,380 560,370 640,340 720,320 780,310 840,280 900,260 940,250 1000,230 1060,210 1100,195 1100,520 100,520"
  />

  <!-- Chart line -->
  <polyline
    fill="none"
    stroke="url(#greenLine)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="100,460 180,440 260,445 340,410 420,420 500,380 560,370 640,340 720,320 780,310 840,280 900,260 940,250 1000,230 1060,210 1100,195"
  />

  <!-- Dot at end of line -->
  <circle cx="1100" cy="195" r="5" fill="#4ade80"/>
  <circle cx="1100" cy="195" r="10" fill="#22c55e" opacity="0.2"/>

  <!-- Candlestick hints -->
  <g stroke="#22c55e" stroke-width="1.5" opacity="0.3">
    <line x1="340" y1="395" x2="340" y2="425"/>
    <rect x="335" y="405" width="10" height="12" fill="#22c55e" opacity="0.4" stroke="none"/>
    <line x1="500" y1="365" x2="500" y2="395"/>
    <rect x="495" y="372" width="10" height="14" fill="#22c55e" opacity="0.4" stroke="none"/>
    <line x1="720" y1="305" x2="720" y2="335"/>
    <rect x="715" y="312" width="10" height="14" fill="#22c55e" opacity="0.4" stroke="none"/>
    <line x1="900" y1="245" x2="900" y2="275"/>
    <rect x="895" y="252" width="10" height="14" fill="#22c55e" opacity="0.4" stroke="none"/>
  </g>

  <!-- Gold bar accent at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#goldAccent)"/>

  <!-- Logo -->
  <text x="80" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold" fill="#f0f0ec" letter-spacing="-1.5">MILKMAN</text>
  <text x="317" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold" fill="url(#goldAccent)" letter-spacing="-1.5">TRADES</text>

  <!-- Subtitle -->
  <text x="80" y="108" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#d4a843" letter-spacing="4" font-weight="bold">PREMIUM OPTIONS ALERTS</text>

  <!-- Stats row -->
  <g font-family="Helvetica, Arial, sans-serif">
    <!-- Win Rate -->
    <rect x="80" y="530" width="180" height="60" rx="6" fill="#13151e" stroke="#1e2030" stroke-width="1"/>
    <text x="105" y="554" font-size="10" fill="#6b6a72" letter-spacing="2">WIN RATE</text>
    <text x="105" y="576" font-size="22" fill="#22c55e" font-weight="bold">82.4%</text>

    <!-- Total Trades -->
    <rect x="280" y="530" width="180" height="60" rx="6" fill="#13151e" stroke="#1e2030" stroke-width="1"/>
    <text x="305" y="554" font-size="10" fill="#6b6a72" letter-spacing="2">TOTAL TRADES</text>
    <text x="305" y="576" font-size="22" fill="#f0f0ec" font-weight="bold">3,247</text>

    <!-- Avg Return -->
    <rect x="480" y="530" width="180" height="60" rx="6" fill="#13151e" stroke="#1e2030" stroke-width="1"/>
    <text x="505" y="554" font-size="10" fill="#6b6a72" letter-spacing="2">AVG RETURN</text>
    <text x="505" y="576" font-size="22" fill="#22c55e" font-weight="bold">+34.7%</text>

    <!-- Members -->
    <rect x="680" y="530" width="180" height="60" rx="6" fill="#13151e" stroke="#1e2030" stroke-width="1"/>
    <text x="705" y="554" font-size="10" fill="#6b6a72" letter-spacing="2">ACTIVE MEMBERS</text>
    <text x="705" y="576" font-size="22" fill="#f0f0ec" font-weight="bold">14,200+</text>
  </g>

  <!-- CTA badge -->
  <rect x="920" y="540" width="200" height="44" rx="22" fill="#d4a843"/>
  <text x="960" y="568" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#08090d" font-weight="bold" letter-spacing="1">Q2 SPOTS OPEN</text>

  <!-- Alert callout box -->
  <rect x="820" y="60" width="300" height="70" rx="8" fill="#13151e" stroke="#1e2030" stroke-width="1"/>
  <circle cx="846" cy="84" r="5" fill="#22c55e"/>
  <text x="860" y="88" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#22c55e" letter-spacing="1" font-weight="bold">LIVE ALERT</text>
  <text x="846" y="110" font-family="monospace" font-size="14" fill="#f0f0ec">SPY 520C 04/17 — Entry $4.20</text>
  <text x="846" y="122" font-family="monospace" font-size="10" fill="#22c55e">TARGET +45% | STOP -15%</text>
</svg>
